
@if(quiz.currentQuestion()){

<div class="card">

      <h2>Questão {{ quiz.currentIndex() + 1 }}</h2>
      <p>{{ quiz.currentQuestion().question }}</p>

  
      @for (item of quiz.currentQuestion().options; track $index) {
           <button (click)="select(quiz.currentQuestion().id, item.id)"   [class.selected]="isSelected(quiz.currentQuestion().id, item.id)">
        {{ item.text }}
      </button>
      }

      <div class="actions">
        <button (click)="next()">Próxima</button>
        <button (click)="finish()">Finalizar</button>
      </div>

    </div>
    }
