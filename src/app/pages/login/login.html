<app-auth-layout subtitle="Entre com suas credenciais" footerText="Não tem conta?" footerLink="/register" footerLinkText="Cadastre-se">
  <form form [formGroup]="loginForm" class="form-container" (ngSubmit)="onSubmit()">
    <mat-form-field>
      <mat-label>Usuário</mat-label>
      <mat-icon matPrefix>person_outline</mat-icon>
      <input matInput formControlName="username">
    </mat-form-field>

    <mat-form-field>
      <mat-label>Senha</mat-label>
      <mat-icon matPrefix>lock_outline</mat-icon>
      <input matInput [type]="hide() ? 'password' : 'text'" formControlName="password" placeholder="Sua senha secreta">
      <button type="button" mat-icon-button matSuffix (click)="clickEvent($event)" [attr.aria-label]="'Esconder senha'"
        [attr.aria-pressed]="hide()">
        <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
      </button>
    </mat-form-field>

    <button mat-flat-button color="primary" class="btn-login-submit" type="submit" [disabled]="loginForm.invalid">
      <span>ENTRAR</span>
      <mat-icon class="mdc-button__icon" aria-hidden="true">arrow_right_alt</mat-icon>
    </button>
  </form>
</app-auth-layout>
